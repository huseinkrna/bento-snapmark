<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Bento SnapMark</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3c2c">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .app {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: black;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #111;
        }
        canvas {
            display: none;
        }
        /* Overlay UI (live view) */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 10;
        }
        /* Watermark gambar di live view (pojok kiri atas) */
        .live-watermark {
            position: absolute;
            top: 12px;
            left: 12px;
            max-width: 120px;
            max-height: 50px;
            object-fit: contain;
            filter: drop-shadow(0 1px 2px black);
        }
        /* Info lokasi & waktu di live view (pojok kiri bawah) */
        .live-info {
            position: absolute;
            bottom: 100px;
            left: 16px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 8px 12px;
            color: white;
            font-size: 11px;
            font-weight: 500;
            max-width: 70%;
            pointer-events: none;
            text-shadow: 0 1px 1px black;
            font-family: monospace;
        }
        .live-info .addr {
            font-size: 10px;
            word-break: break-word;
        }
        /* Tombol dan kontrol bawah (sama seperti sebelumnya) */
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            padding: 12px 16px 30px 16px;
            border-radius: 28px 28px 0 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto;
        }
        .toolbar-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .zoom-group {
            background: #222;
            border-radius: 40px;
            padding: 4px 8px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            max-width: 220px;
            overflow-x: auto;
        }
        .zoom-btn {
            background: #3a3a3a;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            min-width: 48px;
        }
        .zoom-btn.active {
            background: #ff5722;
        }
        .timer-group {
            background: #222;
            padding: 5px 12px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            font-weight: 500;
        }
        .timer-group select {
            background: #444;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 4px 8px;
        }
        .icon-btn {
            background: #2a2a2a;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .capture-btn {
            background: #ff5722;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: 0.05s linear;
        }
        .capture-btn:active {
            transform: scale(0.96);
        }
        .mode-buttons {
            display: flex;
            gap: 12px;
            background: #222;
            padding: 4px 12px;
            border-radius: 40px;
        }
        .mode-btn {
            background: transparent;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }
        .mode-btn.active {
            background: #2e7d32;
        }
        .countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 90px;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 20px black;
            background: rgba(0,0,0,0.7);
            padding: 20px 40px;
            border-radius: 80px;
            z-index: 30;
            font-family: monospace;
        }
        .recording-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #ff4444;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            z-index: 25;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        .info-banner {
            background: #ff9800;
            color: black;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 6px;
            text-align: center;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal-content {
            background: #111;
            width: 90%;
            max-width: 400px;
            border-radius: 24px;
            padding: 16px;
            text-align: center;
        }
        .modal-content img, .modal-content video {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 16px;
        }
        .modal-buttons {
            display: flex;
            gap: 16px;
            margin-top: 20px;
            justify-content: center;
        }
        .share-btn, .retake-btn {
            padding: 12px 24px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .share-btn { background: #25D366; color: white; }
        .retake-btn { background: #555; color: white; }
        .history-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            top: 0;
            background: #0a0a0a;
            z-index: 50;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            padding: 10px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 16px;
        }
        .history-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .history-item {
            background: #222;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        .history-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        .history-item .download-icon {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            pointer-events: auto;
            color: white;
        }
        .close-history {
            background: #f44336;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .hidden {
            display: none !important;
        }
        button:focus-visible {
            outline: 2px solid #ffaa00;
            outline-offset: 2px;
        }
        .watermark-dev {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            z-index: 20;
            pointer-events: none;
            background: none;
        }
    </style>
</head>
<body>
<div class="app">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <!-- Overlay live view (UI) -->
    <div class="ui-overlay">
        <img id="liveWatermark" class="live-watermark" alt="Bento Logo" style="display:none;">
        <div class="live-info" id="liveInfo">
            <div id="liveDateTime">--:--:--</div>
            <div id="liveAddress" class="addr">Mendapatkan lokasi...</div>
            <div id="liveCoord" style="font-size:9px;">--</div>
        </div>
    </div>

    <div class="watermark-dev">deploy by husein • beta v1.0</div>
    <div id="recordingTimer" class="recording-indicator hidden">00:00</div>
    <div id="countdownOverlay" class="countdown hidden">3</div>

    <div class="controls">
        <div class="toolbar-row">
            <div class="mode-buttons">
                <button id="modePhoto" class="mode-btn active">📸 FOTO</button>
                <button id="modeVideo" class="mode-btn">🎥 VIDEO</button>
            </div>
            <div class="zoom-group" id="zoomGroup"></div>
            <button id="historyBtn" class="icon-btn">📁</button>
            <button id="switchCam" class="icon-btn">🔄</button>
        </div>
        <div class="toolbar-row" style="justify-content: space-between;">
            <div class="timer-group">
                ⏱️ TIMER
                <select id="timerSelect">
                    <option value="0">OFF</option>
                    <option value="3">3 DETIK</option>
                    <option value="5">5 DETIK</option>
                    <option value="10">10 DETIK</option>
                </select>
            </div>
            <button id="captureBtn" class="capture-btn">📸</button>
            <div style="width: 44px;"></div>
        </div>
    </div>

    <!-- Modal Preview -->
    <div id="previewModal" class="modal hidden">
        <div class="modal-content">
            <div id="previewMedia"></div>
            <div class="modal-buttons">
                <button id="shareBtn" class="share-btn">📤 KIRIM KE WA</button>
                <button id="retakeBtn" class="retake-btn">⟳ ULANG</button>
            </div>
        </div>
    </div>

    <!-- History Panel -->
    <div id="historyPanel" class="history-panel hidden">
        <div class="history-header">
            <span>📸 HISTORY (MAX 50)</span>
            <button id="closeHistory" class="close-history">TUTUP</button>
        </div>
        <div class="info-banner">⚠️ Hanya 50 terakhir. Klik gambar untuk lihat, klik ikon unduh untuk simpan ke galeri.</div>
        <div id="historyGrid" class="history-grid"></div>
    </div>
</div>

<script>
    (function() {
        // ==================== DOM Elements ====================
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const modePhotoBtn = document.getElementById('modePhoto');
        const modeVideoBtn = document.getElementById('modeVideo');
        const captureBtn = document.getElementById('captureBtn');
        const switchCamBtn = document.getElementById('switchCam');
        const timerSelect = document.getElementById('timerSelect');
        const countdownDiv = document.getElementById('countdownOverlay');
        const previewModal = document.getElementById('previewModal');
        const previewMedia = document.getElementById('previewMedia');
        const shareBtn = document.getElementById('shareBtn');
        const retakeBtn = document.getElementById('retakeBtn');
        const historyBtn = document.getElementById('historyBtn');
        const historyPanel = document.getElementById('historyPanel');
        const historyGrid = document.getElementById('historyGrid');
        const closeHistory = document.getElementById('closeHistory');
        const zoomGroup = document.getElementById('zoomGroup');
        const recordingTimerDiv = document.getElementById('recordingTimer');
        const liveWatermarkImg = document.getElementById('liveWatermark');
        const liveDateTimeDiv = document.getElementById('liveDateTime');
        const liveAddressDiv = document.getElementById('liveAddress');
        const liveCoordDiv = document.getElementById('liveCoord');

        // ==================== State ====================
        let stream = null;
        let currentFacing = 'environment';
        let currentMode = 'photo';
        let isRecording = false;
        let mediaRecorder = null;
        let recordedChunks = [];
        let photoBlob = null;
        let videoBlob = null;
        let currentUniqueCode = '';
        let currentLocation = {
            fullAddress: 'Mendapatkan lokasi...',
            lat: 0, lng: 0,
            latDMS: '', lngDMS: ''
        };
        let zoomLevel = 1;
        let availableZoomValues = [1];
        let watermarkImage = null;
        let videoRecordInterval = null;
        let videoWarningShown = false;

        // ==================== Watermark Image ====================
        function loadWatermarkImage() {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    watermarkImage = img;
                    liveWatermarkImg.src = img.src;
                    liveWatermarkImg.style.display = 'block';
                    resolve(img);
                };
                img.onerror = () => {
                    console.warn("Gambar watermark tidak ditemukan, lanjut tanpa gambar");
                    watermarkImage = null;
                    liveWatermarkImg.style.display = 'none';
                    resolve(null);
                };
                img.src = 'bento-logo.png'; // Ganti dengan nama file Anda
            });
        }

        // ==================== Update Live UI ====================
        function updateLiveUI() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('id-ID');
            liveDateTimeDiv.textContent = timeStr;
            if (currentLocation.fullAddress) {
                liveAddressDiv.textContent = currentLocation.fullAddress.length > 80 ? currentLocation.fullAddress.substring(0,77)+'...' : currentLocation.fullAddress;
            }
            liveCoordDiv.textContent = `${currentLocation.latDMS}, ${currentLocation.lngDMS}`;
        }
        setInterval(updateLiveUI, 1000);
        updateLiveUI();

        // ==================== Geolocation + Reverse Geocoding (Akurat) ====================
        function toDMS(coord, type) {
            const absolute = Math.abs(coord);
            const degrees = Math.floor(absolute);
            const minutesNotTrunc = (absolute - degrees) * 60;
            const minutes = Math.floor(minutesNotTrunc);
            const seconds = ((minutesNotTrunc - minutes) * 60).toFixed(1);
            const direction = (type === 'lat') ? (coord >= 0 ? 'N' : 'S') : (coord >= 0 ? 'E' : 'W');
            return `${degrees}°${minutes}'${seconds}"${direction}`;
        }

        async function getLocationAndAddress() {
            if (!navigator.geolocation) {
                currentLocation.fullAddress = "GPS tidak support";
                updateLiveUI();
                return;
            }
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                currentLocation.lat = lat;
                currentLocation.lng = lng;
                currentLocation.latDMS = toDMS(lat, 'lat');
                currentLocation.lngDMS = toDMS(lng, 'lng');
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1&accept-language=id`);
                    const data = await res.json();
                    let full = data.display_name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                    currentLocation.fullAddress = full;
                } catch (e) {
                    currentLocation.fullAddress = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                }
                updateLiveUI();
            }, (err) => {
                console.warn(err);
                currentLocation.fullAddress = "Izin lokasi ditolak";
                updateLiveUI();
            });
        }
        getLocationAndAddress();

        // ==================== Unique Code ====================
        function generateUniqueCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 8; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            currentUniqueCode = code;
            return code;
        }

        // ==================== Kamera & Zoom (maks 2x, tapi support <1x) ====================
        async function initCamera(facingMode) {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                const constraints = { video: { facingMode: { exact: facingMode }, zoom: zoomLevel } };
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                await video.play();
                currentFacing = facingMode;
                const track = stream.getVideoTracks()[0];
                const caps = track.getCapabilities();
                if (caps.zoom) {
                    const possibleValues = [0.5, 0.6, 0.7, 0.8, 0.9, 1, 1.2, 1.5, 1.8, 2];
                    availableZoomValues = possibleValues.filter(v => v >= caps.zoom.min && v <= caps.zoom.max && v <= 2);
                    if (availableZoomValues.length === 0) availableZoomValues = [1];
                    renderZoomButtons();
                } else {
                    zoomGroup.innerHTML = '<span style="color:#aaa; font-size:12px;">Zoom tidak support</span>';
                }
            } catch (err) {
                const fallback = await navigator.mediaDevices.getUserMedia({ video: true });
                stream = fallback;
                video.srcObject = fallback;
                await video.play();
            }
        }

        function renderZoomButtons() {
            zoomGroup.innerHTML = '';
            for (let val of availableZoomValues) {
                const btn = document.createElement('button');
                btn.className = `zoom-btn ${val === zoomLevel ? 'active' : ''}`;
                btn.textContent = `${val}x`;
                btn.dataset.zoom = val;
                btn.onclick = () => setZoom(val);
                zoomGroup.appendChild(btn);
            }
        }

        async function setZoom(val) {
            if (!stream) return;
            const track = stream.getVideoTracks()[0];
            if (track && track.getCapabilities().zoom) {
                await track.applyConstraints({ advanced: [{ zoom: val }] });
                zoomLevel = val;
                document.querySelectorAll('.zoom-btn').forEach(btn => btn.classList.remove('active'));
                const active = [...document.querySelectorAll('.zoom-btn')].find(b => parseFloat(b.dataset.zoom) === val);
                if (active) active.classList.add('active');
            }
        }

        function switchCamera() {
            const newFacing = currentFacing === 'environment' ? 'user' : 'environment';
            initCamera(newFacing);
        }

        // ==================== Capture Photo (teks tidak terpotong) ====================
        async function capturePhoto() {
            if (!video.videoWidth) { alert("Kamera belum siap"); return; }
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Gambar watermark logo (kiri atas) dengan tinggi 60px
            if (watermarkImage) {
                const targetH = 60;
                const ratio = watermarkImage.width / watermarkImage.height;
                const targetW = targetH * ratio;
                ctx.drawImage(watermarkImage, 10, 10, targetW, targetH);
            }
            
            // Teks di kiri bawah, menggunakan font lebih kecil agar muat
            const now = new Date();
            const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
            const hari = days[now.getDay()];
            const tanggal = now.toLocaleDateString('id-ID', { year:'numeric', month:'2-digit', day:'2-digit' }).replace(/\//g,'/');
            const jam = now.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
            const locationText = currentLocation.fullAddress || "Lokasi tidak diketahui";
            const coordText = `${currentLocation.latDMS}, ${currentLocation.lngDMS}`;
            const unique = generateUniqueCode();
            
            ctx.font = 'bold 20px "Inter", monospace';
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = 'black';
            ctx.shadowBlur = 4;
            // Baris 1
            ctx.fillText(`${hari}, ${tanggal}  ${jam}`, 20, canvas.height - 130);
            // Baris 2: alamat (potong jika terlalu panjang? Kita biarkan wrap sederhana tidak bisa, jadi kita gunakan font lebih kecil)
            ctx.font = '15px "Inter", monospace';
            // Jika alamat terlalu panjang, kita bisa potong tapi tidak ideal. Untuk sementara kita tulis apa adanya.
            ctx.fillText(locationText, 20, canvas.height - 95);
            // Baris 3: koordinat
            ctx.fillText(coordText, 20, canvas.height - 65);
            // Baris 4: kode
            ctx.font = 'bold 15px monospace';
            ctx.fillText(`Kode: ${unique}`, 20, canvas.height - 35);
            
            canvas.toBlob(blob => {
                photoBlob = blob;
                showPreview(blob, 'image/jpeg');
                saveToHistory(blob, 'image/jpeg');
            }, 'image/jpeg', 1);
        }

        // ==================== Video Recording (dengan durasi & batas 30 detik) ====================
        let videoCanvasStream = null;
        let animationId = null;

        function showVideoWarning() {
            if (!videoWarningShown) {
                alert("Mode Video: Maksimal rekam 30 detik. Rekam akan berhenti otomatis.");
                videoWarningShown = true;
            }
        }

        async function startVideoRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') return;
            showVideoWarning();
            recordedChunks = [];
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const unique = generateUniqueCode();
            let startTime = Date.now();
            recordingTimerDiv.classList.remove('hidden');
            if (videoRecordInterval) clearInterval(videoRecordInterval);
            videoRecordInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const secs = elapsed % 60;
                const mins = Math.floor(elapsed / 60);
                recordingTimerDiv.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                if (elapsed >= 30) stopVideoRecording();
            }, 200);
            
            function drawFrame() {
                if (video.paused || video.ended) return;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                if (watermarkImage) {
                    const targetH = 60;
                    const ratio = watermarkImage.width / watermarkImage.height;
                    const targetW = targetH * ratio;
                    ctx.drawImage(watermarkImage, 10, 10, targetW, targetH);
                }
                const now = new Date();
                const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
                const hari = days[now.getDay()];
                const tanggal = now.toLocaleDateString('id-ID').replace(/\//g,'/');
                const jam = now.toLocaleTimeString('id-ID');
                const locationText = currentLocation.fullAddress || "Lokasi tidak diketahui";
                const coordText = `${currentLocation.latDMS}, ${currentLocation.lngDMS}`;
                ctx.font = 'bold 20px "Inter", monospace';
                ctx.fillStyle = 'white';
                ctx.shadowBlur = 4;
                ctx.fillText(`${hari}, ${tanggal}  ${jam}`, 20, canvas.height - 130);
                ctx.font = '15px "Inter", monospace';
                ctx.fillText(locationText, 20, canvas.height - 95);
                ctx.fillText(coordText, 20, canvas.height - 65);
                ctx.font = 'bold 15px monospace';
                ctx.fillText(`Kode: ${unique}`, 20, canvas.height - 35);
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    animationId = requestAnimationFrame(drawFrame);
                }
            }
            
            videoCanvasStream = canvas.captureStream(30);
            let audioStream = null;
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const combined = new MediaStream([...videoCanvasStream.getTracks(), ...audioStream.getTracks()]);
                mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/mp4' });
                window.audioStreamToStop = audioStream;
            } catch (e) {
                mediaRecorder = new MediaRecorder(videoCanvasStream, { mimeType: 'video/mp4' });
            }
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                cancelAnimationFrame(animationId);
                if (videoRecordInterval) clearInterval(videoRecordInterval);
                recordingTimerDiv.classList.add('hidden');
                const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                videoBlob = blob;
                showPreview(blob, 'video/mp4');
                saveToHistory(blob, 'video/mp4');
                if (videoCanvasStream) videoCanvasStream.getTracks().forEach(t => t.stop());
                if (window.audioStreamToStop) window.audioStreamToStop.getTracks().forEach(t => t.stop());
                updateCaptureButtonForVideo(false);
            };
            mediaRecorder.start(1000);
            drawFrame();
            updateCaptureButtonForVideo(true);
            setTimeout(() => { if (mediaRecorder && mediaRecorder.state === 'recording') stopVideoRecording(); }, 30000);
        }
        
        function stopVideoRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
        }
        
        function updateCaptureButtonForVideo(recording) {
            isRecording = recording;
            captureBtn.textContent = recording ? '⏹️' : (currentMode === 'photo' ? '📸' : '🎥');
        }

        // ==================== Timer ====================
        let timerInterval = null;
        function startTimer(seconds, callback) {
            if (timerInterval) clearInterval(timerInterval);
            if (seconds <= 0) { callback(); return; }
            let remaining = seconds;
            countdownDiv.textContent = remaining;
            countdownDiv.classList.remove('hidden');
            timerInterval = setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    countdownDiv.classList.add('hidden');
                    callback();
                } else {
                    countdownDiv.textContent = remaining;
                }
            }, 1000);
        }
        function cancelTimer() {
            if (timerInterval) { clearInterval(timerInterval); countdownDiv.classList.add('hidden'); }
        }

        // ==================== Preview & Share ====================
        function showPreview(blob, type) {
            previewMedia.innerHTML = '';
            const el = type.startsWith('image') ? document.createElement('img') : document.createElement('video');
            el.src = URL.createObjectURL(blob);
            if (!type.startsWith('image')) el.controls = true;
            previewMedia.appendChild(el);
            previewModal.classList.remove('hidden');
            const newShare = shareBtn.cloneNode(true);
            const newRetake = retakeBtn.cloneNode(true);
            shareBtn.parentNode.replaceChild(newShare, shareBtn);
            retakeBtn.parentNode.replaceChild(newRetake, retakeBtn);
            newShare.addEventListener('click', () => shareToWA(blob, type === 'image/jpeg' ? 'bento_snap.jpg' : 'bento_video.mp4'));
            newRetake.addEventListener('click', () => {
                previewModal.classList.add('hidden');
                URL.revokeObjectURL(el.src);
            });
        }
        
        async function shareToWA(blob, filename) {
            if (!blob) return;
            const file = new File([blob], filename, { type: blob.type });
            if (navigator.share) {
                try {
                    await navigator.share({ files: [file], title: 'Bento SnapMark' });
                    previewModal.classList.add('hidden');
                } catch (err) { if (err.name !== 'AbortError') alert("Gagal share: "+err.message); }
            } else {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                a.click();
                alert("File diunduh, kirim manual ke WA.");
            }
        }

        // ==================== History with Download ====================
        let db = null;
        const DB_NAME = 'BentoHistoryV4';
        const STORE_NAME = 'media';
        const MAX_ITEMS = 50;
        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onerror = () => reject(req.error);
                req.onsuccess = () => { db = req.result; resolve(db); };
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { autoIncrement: true });
                    }
                };
            });
        }
        async function saveToHistory(blob, type) {
            if (!db) await openDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.add({ blob, type, timestamp: Date.now(), code: currentUniqueCode });
            tx.oncomplete = async () => {
                const all = await getAllHistory();
                if (all.length > MAX_ITEMS) {
                    const toDelete = all.slice(0, all.length - MAX_ITEMS);
                    const delTx = db.transaction(STORE_NAME, 'readwrite');
                    const delStore = delTx.objectStore(STORE_NAME);
                    for (let item of toDelete) delStore.delete(item.id);
                }
            };
        }
        async function getAllHistory() {
            if (!db) await openDB();
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const req = store.getAll();
                req.onsuccess = () => {
                    let items = req.result.map((item, idx) => ({ ...item, id: idx }));
                    items.sort((a,b) => a.timestamp - b.timestamp);
                    resolve(items);
                };
                req.onerror = () => resolve([]);
            });
        }
        async function renderHistory() {
            const items = await getAllHistory();
            historyGrid.innerHTML = '';
            if (items.length === 0) {
                historyGrid.innerHTML = '<div style="color:white; text-align:center; grid-column:span 3">Belum ada foto/video</div>';
                return;
            }
            for (let item of items.slice(-MAX_ITEMS)) {
                const url = URL.createObjectURL(item.blob);
                const div = document.createElement('div');
                div.className = 'history-item';
                const img = document.createElement('img');
                img.src = url;
                img.onclick = () => showPreview(item.blob, item.type);
                const downloadSpan = document.createElement('span');
                downloadSpan.className = 'download-icon';
                downloadSpan.innerHTML = '⬇️';
                downloadSpan.onclick = (e) => {
                    e.stopPropagation();
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = item.type === 'image/jpeg' ? `bento_${item.timestamp}.jpg` : `bento_${item.timestamp}.mp4`;
                    a.click();
                };
                div.appendChild(img);
                div.appendChild(downloadSpan);
                historyGrid.appendChild(div);
            }
        }

        // ==================== Event Listeners ====================
        modePhotoBtn.onclick = () => {
            currentMode = 'photo';
            modePhotoBtn.classList.add('active');
            modeVideoBtn.classList.remove('active');
            captureBtn.textContent = '📸';
            if (isRecording) stopVideoRecording();
            cancelTimer();
        };
        modeVideoBtn.onclick = () => {
            currentMode = 'video';
            modeVideoBtn.classList.add('active');
            modePhotoBtn.classList.remove('active');
            captureBtn.textContent = '🎥';
            if (isRecording) stopVideoRecording();
            cancelTimer();
            showVideoWarning();
        };
        captureBtn.onclick = () => {
            cancelTimer();
            const timerVal = parseInt(timerSelect.value);
            if (currentMode === 'photo') {
                startTimer(timerVal, () => capturePhoto());
            } else {
                if (!isRecording) startTimer(timerVal, () => startVideoRecording());
                else stopVideoRecording();
            }
        };
        switchCamBtn.onclick = switchCamera;
        historyBtn.onclick = async () => { await renderHistory(); historyPanel.classList.remove('hidden'); };
        closeHistory.onclick = () => historyPanel.classList.add('hidden');

        // ==================== Init ====================
        loadWatermarkImage().then(() => {
            initCamera('environment');
            openDB().catch(console.warn);
            generateUniqueCode();
        });
    })();
</script>
