<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Bento SnapMark</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3c2c">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .app {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: black;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #111;
        }
        canvas {
            display: none;
        }
        /* UI Overlay */
        .top-info {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            padding: 12px 16px 40px 16px;
            z-index: 10;
            color: white;
            font-size: 12px;
            text-shadow: 0 1px 2px black;
            pointer-events: none;
        }
        .datetime {
            font-size: 14px;
            font-weight: bold;
            font-family: monospace;
            margin-bottom: 4px;
        }
        .location {
            font-size: 11px;
            opacity: 0.9;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .location span {
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 12px;
        }
        .unique-code {
            position: absolute;
            top: 80px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-family: monospace;
            z-index: 10;
            color: #0f0;
            pointer-events: none;
        }
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            padding: 12px 16px 30px 16px;
            border-radius: 24px 24px 0 0;
            z-index: 15;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .mode-zoom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .mode-buttons {
            display: flex;
            gap: 8px;
            background: #333;
            border-radius: 40px;
            padding: 4px;
        }
        .mode-btn {
            background: transparent;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-btn.active {
            background: #2e7d32;
        }
        .zoom-buttons {
            display: flex;
            gap: 8px;
            background: #222;
            border-radius: 40px;
            padding: 4px 8px;
        }
        .zoom-btn {
            background: #444;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .zoom-btn.active {
            background: #ff5722;
        }
        .timer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .timer-select {
            background: #222;
            padding: 5px 12px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
        }
        .timer-select select {
            background: #444;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 4px 8px;
            margin-left: 8px;
        }
        .capture-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            align-items: center;
        }
        .capture-btn {
            background: #ff5722;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        .capture-btn:active {
            transform: scale(0.95);
        }
        .icon-btn {
            background: #444;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .switch-cam, .history-btn {
            background: #333;
        }
        .countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px black;
            background: rgba(0,0,0,0.7);
            padding: 20px 40px;
            border-radius: 60px;
            z-index: 30;
            font-family: monospace;
        }
        /* Modal Preview */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal-content {
            background: #111;
            width: 90%;
            max-width: 400px;
            border-radius: 24px;
            padding: 16px;
            text-align: center;
        }
        .modal-content img, .modal-content video {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 16px;
        }
        .modal-buttons {
            display: flex;
            gap: 16px;
            margin-top: 20px;
            justify-content: center;
        }
        .share-btn, .retake-btn {
            padding: 12px 24px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .share-btn { background: #25D366; color: white; }
        .retake-btn { background: #555; color: white; }
        /* History Panel */
        .history-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            top: 0;
            background: rgba(0,0,0,0.95);
            z-index: 50;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            padding: 10px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 16px;
        }
        .history-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .history-item {
            background: #222;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
        }
        .history-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
        }
        .close-history {
            background: #f44336;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
        }
        .watermark-dev {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 9px;
            color: rgba(255,255,255,0.4);
            z-index: 20;
            pointer-events: none;
            background: none;
            text-shadow: none;
        }
        .hidden {
            display: none !important;
        }
        .info-banner {
            background: #ff9800;
            color: black;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 6px;
            text-align: center;
        }
        .zoom-disable {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="app">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    
    <!-- Overlay UI -->
    <div class="top-info">
        <div class="datetime" id="datetime">--/--/---- --:--:--</div>
        <div class="location" id="location">
            <span>📍 Mendapatkan lokasi...</span>
        </div>
    </div>
    <div class="unique-code" id="uniqueCode">Kode: ------</div>
    
    <div class="controls">
        <div class="mode-zoom">
            <div class="mode-buttons">
                <button id="modePhoto" class="mode-btn active">📸 Foto</button>
                <button id="modeVideo" class="mode-btn">🎥 Video</button>
            </div>
            <div class="zoom-buttons" id="zoomContainer">
                <button data-zoom="0.5" class="zoom-btn">0.5x</button>
                <button data-zoom="1" class="zoom-btn active">1x</button>
                <button data-zoom="2" class="zoom-btn">2x</button>
            </div>
        </div>
        <div class="timer-row">
            <div class="timer-select">
                ⏱️ Timer <select id="timerSelect">
                    <option value="0">Off</option>
                    <option value="3">3 detik</option>
                    <option value="5">5 detik</option>
                    <option value="10">10 detik</option>
                </select>
            </div>
            <div style="display: flex; gap: 12px;">
                <button id="historyBtn" class="icon-btn history-btn">📁</button>
                <button id="switchCam" class="icon-btn switch-cam">🔄</button>
            </div>
        </div>
        <div class="capture-row">
            <button id="captureBtn" class="capture-btn">📸</button>
        </div>
    </div>
    <div class="watermark-dev">deploy by husein • beta v1.0</div>
    
    <div id="countdownOverlay" class="countdown hidden">3</div>
    
    <!-- Modal Preview -->
    <div id="previewModal" class="modal hidden">
        <div class="modal-content">
            <div id="previewMedia"></div>
            <div class="modal-buttons">
                <button id="shareBtn" class="share-btn">📤 Kirim ke WA</button>
                <button id="retakeBtn" class="retake-btn">⟳ Ulang</button>
            </div>
        </div>
    </div>
    
    <!-- History Panel -->
    <div id="historyPanel" class="history-panel hidden">
        <div class="history-header">
            <span>📸 History (maks 50 foto terakhir)</span>
            <button id="closeHistory" class="close-history">Tutup</button>
        </div>
        <div class="info-banner">
            ⚠️ Foto disimpan lokal di HP. Hanya 50 terakhir. Lebih lama akan terhapus otomatis.
        </div>
        <div id="historyGrid" class="history-grid"></div>
    </div>
</div>

<script>
    // ==================== DOM Elements ====================
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const datetimeDiv = document.getElementById('datetime');
    const locationDiv = document.getElementById('location');
    const uniqueCodeSpan = document.getElementById('uniqueCode');
    const modePhotoBtn = document.getElementById('modePhoto');
    const modeVideoBtn = document.getElementById('modeVideo');
    const captureBtn = document.getElementById('captureBtn');
    const switchCamBtn = document.getElementById('switchCam');
    const timerSelect = document.getElementById('timerSelect');
    const countdownDiv = document.getElementById('countdownOverlay');
    const previewModal = document.getElementById('previewModal');
    const previewMedia = document.getElementById('previewMedia');
    const shareBtn = document.getElementById('shareBtn');
    const retakeBtn = document.getElementById('retakeBtn');
    const historyBtn = document.getElementById('historyBtn');
    const historyPanel = document.getElementById('historyPanel');
    const historyGrid = document.getElementById('historyGrid');
    const closeHistory = document.getElementById('closeHistory');
    const zoomContainer = document.getElementById('zoomContainer');
    
    // ==================== State ====================
    let stream = null;
    let currentFacing = 'environment'; // 'user' or 'environment'
    let currentMode = 'photo';
    let isRecording = false;
    let mediaRecorder = null;
    let recordedChunks = [];
    let photoBlob = null;
    let videoBlob = null;
    let currentUniqueCode = '';
    let currentLocation = { address: '', lat: '', lng: '' };
    let zoomLevel = 1;
    let zoomCapabilities = { min: 1, max: 1, step: 0 };
    
    // Timestamp interval
    setInterval(updateDateTime, 1000);
    updateDateTime();
    
    function updateDateTime() {
        const now = new Date();
        datetimeDiv.textContent = `${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;
    }
    
    // ==================== Geolocation ====================
    function getLocation() {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                currentLocation.lat = lat;
                currentLocation.lng = lng;
                // Reverse geocoding (gunakan OpenStreetMap Nominatim gratis)
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
                    const data = await res.json();
                    let addr = '';
                    if (data.address) {
                        const a = data.address;
                        addr = `${a.road || ''} ${a.house_number || ''}, ${a.village || a.suburb || ''}, ${a.city || a.town || a.county || ''}, ${a.province || ''}`;
                    } else {
                        addr = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                    }
                    currentLocation.address = addr;
                    locationDiv.innerHTML = `<span>📍 ${addr}</span><span>🗺️ ${lat.toFixed(5)}, ${lng.toFixed(5)}</span>`;
                } catch (e) {
                    currentLocation.address = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
                    locationDiv.innerHTML = `<span>📍 Koordinat: ${lat.toFixed(5)}, ${lng.toFixed(5)}</span>`;
                }
            }, (err) => {
                console.warn(err);
                locationDiv.innerHTML = `<span>⚠️ Izin lokasi ditolak, gunakan koordinat default</span>`;
                currentLocation.address = "Lokasi tidak diketahui";
                currentLocation.lat = "-7.776441";
                currentLocation.lng = "110.409210";
            });
        } else {
            locationDiv.innerHTML = `<span>⚠️ GPS tidak support</span>`;
        }
    }
    getLocation();
    
    // Generate random unique code
    function generateUniqueCode() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = '';
        for (let i = 0; i < 8; i++) {
            code += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        currentUniqueCode = code;
        uniqueCodeSpan.textContent = `Kode: ${code}`;
        return code;
    }
    
    // ==================== Kamera & Zoom ====================
    async function initCamera(facingMode) {
        if (stream) stream.getTracks().forEach(t => t.stop());
        try {
            const constraints = {
                video: { facingMode: { exact: facingMode }, zoom: zoomLevel }
            };
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            await video.play();
            currentFacing = facingMode;
            // Cek zoom capabilities
            const track = stream.getVideoTracks()[0];
            const capabilities = track.getCapabilities();
            if (capabilities.zoom) {
                zoomCapabilities.min = capabilities.zoom.min;
                zoomCapabilities.max = capabilities.zoom.max;
                zoomCapabilities.step = capabilities.zoom.step;
                // Enable zoom buttons sesuai range
                document.querySelectorAll('.zoom-btn').forEach(btn => {
                    const val = parseFloat(btn.dataset.zoom);
                    if (val >= zoomCapabilities.min && val <= zoomCapabilities.max) {
                        btn.classList.remove('zoom-disable');
                        btn.style.opacity = '1';
                    } else {
                        btn.classList.add('zoom-disable');
                        btn.style.opacity = '0.4';
                    }
                });
            } else {
                // Zoom tidak support, disable semua
                document.querySelectorAll('.zoom-btn').forEach(btn => btn.classList.add('zoom-disable'));
            }
        } catch (err) {
            console.warn(err);
            const fallback = await navigator.mediaDevices.getUserMedia({ video: true });
            stream = fallback;
            video.srcObject = fallback;
            await video.play();
        }
    }
    
    async function setZoom(zoomValue) {
        if (!stream) return;
        const track = stream.getVideoTracks()[0];
        if (track && track.getCapabilities().zoom) {
            await track.applyConstraints({ advanced: [{ zoom: zoomValue }] });
            zoomLevel = zoomValue;
        }
    }
    
    function switchCamera() {
        const newFacing = currentFacing === 'environment' ? 'user' : 'environment';
        initCamera(newFacing);
    }
    
    // ==================== Capture Photo ====================
    async function capturePhoto() {
        if (!video.videoWidth) { alert("Kamera belum siap"); return; }
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        // Draw timestamp + lokasi + kode
        const now = new Date();
        const dateTimeStr = `${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;
        const locationText = currentLocation.address || `${currentLocation.lat},${currentLocation.lng}`;
        const code = generateUniqueCode();
        
        ctx.font = 'bold 20px "Courier New", monospace';
        ctx.fillStyle = 'white';
        ctx.shadowColor = 'black';
        ctx.shadowBlur = 4;
        // Pojok kiri bawah
        ctx.fillText(`${dateTimeStr}`, 20, canvas.height - 70);
        ctx.font = '14px monospace';
        ctx.fillText(`${locationText}`, 20, canvas.height - 45);
        ctx.fillText(`Kode: ${code}`, 20, canvas.height - 25);
        
        canvas.toBlob(blob => {
            photoBlob = blob;
            showPreview(blob, 'image/jpeg');
            saveToHistory(blob, 'image/jpeg');
        }, 'image/jpeg');
    }
    
    // ==================== Video Recording ====================
    let videoCanvasStream = null;
    let animationId = null;
    async function startVideoRecording() {
        if (mediaRecorder && mediaRecorder.state === 'recording') return;
        recordedChunks = [];
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const locationText = currentLocation.address || `${currentLocation.lat},${currentLocation.lng}`;
        const code = generateUniqueCode(); // kode unik untuk video (statis sepanjang rekaman)
        
        function drawVideoFrame() {
            if (video.paused || video.ended) return;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const now = new Date();
            const dateTimeStr = `${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;
            ctx.font = 'bold 20px "Courier New", monospace';
            ctx.fillStyle = 'white';
            ctx.shadowColor = 'black';
            ctx.shadowBlur = 4;
            ctx.fillText(`${dateTimeStr}`, 20, canvas.height - 70);
            ctx.font = '14px monospace';
            ctx.fillText(`${locationText}`, 20, canvas.height - 45);
            ctx.fillText(`Kode: ${code}`, 20, canvas.height - 25);
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                animationId = requestAnimationFrame(drawVideoFrame);
            }
        }
        
        videoCanvasStream = canvas.captureStream(30);
        let audioStream = null;
        try {
            audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const combined = new MediaStream([...videoCanvasStream.getTracks(), ...audioStream.getTracks()]);
            mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/mp4' });
            window.audioStreamToStop = audioStream;
        } catch (e) {
            mediaRecorder = new MediaRecorder(videoCanvasStream, { mimeType: 'video/mp4' });
        }
        
        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) recordedChunks.push(e.data);
        };
        mediaRecorder.onstop = () => {
            cancelAnimationFrame(animationId);
            const blob = new Blob(recordedChunks, { type: 'video/mp4' });
            videoBlob = blob;
            showPreview(blob, 'video/mp4');
            saveToHistory(blob, 'video/mp4');
            if (videoCanvasStream) videoCanvasStream.getTracks().forEach(t => t.stop());
            if (window.audioStreamToStop) window.audioStreamToStop.getTracks().forEach(t => t.stop());
            updateCaptureButtonForVideo(false);
        };
        mediaRecorder.start(1000);
        drawVideoFrame();
        updateCaptureButtonForVideo(true);
        // Auto stop setelah 30 detik (aman)
        setTimeout(() => {
            if (mediaRecorder && mediaRecorder.state === 'recording') stopVideoRecording();
        }, 30000);
    }
    
    function stopVideoRecording() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
        }
    }
    
    function updateCaptureButtonForVideo(recording) {
        isRecording = recording;
        if (recording) {
            captureBtn.textContent = '⏹️';
            captureBtn.style.background = '#f44336';
        } else {
            captureBtn.textContent = currentMode === 'photo' ? '📸' : '🎥';
            captureBtn.style.background = '#ff5722';
        }
    }
    
    // ==================== Timer ====================
    let timerInterval = null;
    function startTimer(seconds, callback) {
        if (timerInterval) clearInterval(timerInterval);
        if (seconds <= 0) {
            callback();
            return;
        }
        let remaining = seconds;
        countdownDiv.textContent = remaining;
        countdownDiv.classList.remove('hidden');
        timerInterval = setInterval(() => {
            remaining--;
            if (remaining <= 0) {
                clearInterval(timerInterval);
                countdownDiv.classList.add('hidden');
                callback();
            } else {
                countdownDiv.textContent = remaining;
            }
        }, 1000);
    }
    
    function cancelTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            countdownDiv.classList.add('hidden');
        }
    }
    
    // ==================== Preview & Share ====================
    function showPreview(blob, type) {
        previewMedia.innerHTML = '';
        if (type.startsWith('image')) {
            const img = document.createElement('img');
            img.src = URL.createObjectURL(blob);
            previewMedia.appendChild(img);
        } else {
            const vid = document.createElement('video');
            vid.src = URL.createObjectURL(blob);
            vid.controls = true;
            previewMedia.appendChild(vid);
        }
        previewModal.classList.remove('hidden');
        // Refresh button listeners
        const newShare = shareBtn.cloneNode(true);
        const newRetake = retakeBtn.cloneNode(true);
        shareBtn.parentNode.replaceChild(newShare, shareBtn);
        retakeBtn.parentNode.replaceChild(newRetake, retakeBtn);
        newShare.addEventListener('click', () => shareToWA(blob, type === 'image/jpeg' ? 'snap.jpg' : 'video.mp4'));
        newRetake.addEventListener('click', () => {
            previewModal.classList.add('hidden');
            URL.revokeObjectURL(previewMedia.firstChild?.src);
        });
    }
    
    async function shareToWA(blob, filename) {
        if (!blob) return;
        const file = new File([blob], filename, { type: blob.type });
        if (navigator.share) {
            try {
                await navigator.share({ files: [file], title: 'Bento SnapMark' });
                previewModal.classList.add('hidden');
            } catch (err) {
                if (err.name !== 'AbortError') alert("Gagal share: " + err.message);
            }
        } else {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            a.click();
            alert("File diunduh, kirim manual ke WA.");
        }
    }
    
    // ==================== History (IndexedDB) ====================
    let db = null;
    const DB_NAME = 'BentoHistory';
    const STORE_NAME = 'media';
    const MAX_ITEMS = 50;
    
    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    const store = db.createObjectStore(STORE_NAME, { autoIncrement: true });
                    store.createIndex('timestamp', 'timestamp');
                }
            };
        });
    }
    
    async function saveToHistory(blob, type) {
        if (!db) await openDB();
        const timestamp = Date.now();
        const item = { blob: blob, type: type, timestamp: timestamp, uniqueCode: currentUniqueCode };
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.add(item);
        tx.oncomplete = async () => {
            // Hapus jika lebih dari MAX_ITEMS
            const all = await getAllHistory();
            if (all.length > MAX_ITEMS) {
                const toDelete = all.slice(0, all.length - MAX_ITEMS);
                const deleteTx = db.transaction(STORE_NAME, 'readwrite');
                const deleteStore = deleteTx.objectStore(STORE_NAME);
                for (let item of toDelete) {
                    deleteStore.delete(item.id);
                }
            }
        };
    }
    
    async function getAllHistory() {
        if (!db) await openDB();
        return new Promise((resolve) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const request = store.getAll();
            request.onsuccess = () => {
                let items = request.result.map((item, idx) => ({ ...item, id: idx }));
                items.sort((a,b) => a.timestamp - b.timestamp);
                resolve(items);
            };
            request.onerror = () => resolve([]);
        });
    }
    
    async function renderHistory() {
        const items = await getAllHistory();
        historyGrid.innerHTML = '';
        if (items.length === 0) {
            historyGrid.innerHTML = '<div style="color:white; text-align:center; grid-column:span 3">Belum ada foto/video</div>';
            return;
        }
        for (let item of items.slice(-MAX_ITEMS)) {
            const url = URL.createObjectURL(item.blob);
            const div = document.createElement('div');
            div.className = 'history-item';
            const img = document.createElement('img');
            img.src = url;
            img.onclick = () => {
                showPreview(item.blob, item.type);
            };
            div.appendChild(img);
            historyGrid.appendChild(div);
        }
    }
    
    // Event history
    historyBtn.onclick = async () => {
        await renderHistory();
        historyPanel.classList.remove('hidden');
    };
    closeHistory.onclick = () => historyPanel.classList.add('hidden');
    
    // ==================== Event Listeners Utama ====================
    modePhotoBtn.onclick = () => {
        currentMode = 'photo';
        modePhotoBtn.classList.add('active');
        modeVideoBtn.classList.remove('active');
        captureBtn.textContent = '📸';
        if (isRecording) stopVideoRecording();
        cancelTimer();
    };
    modeVideoBtn.onclick = () => {
        currentMode = 'video';
        modeVideoBtn.classList.add('active');
        modePhotoBtn.classList.remove('active');
        captureBtn.textContent = '🎥';
        if (isRecording) stopVideoRecording();
        cancelTimer();
    };
    captureBtn.onclick = () => {
        cancelTimer();
        const timerVal = parseInt(timerSelect.value);
        if (currentMode === 'photo') {
            startTimer(timerVal, () => capturePhoto());
        } else {
            if (!isRecording) {
                startTimer(timerVal, () => startVideoRecording());
            } else {
                stopVideoRecording();
            }
        }
    };
    switchCamBtn.onclick = switchCamera;
    
    // Zoom buttons
    document.querySelectorAll('.zoom-btn').forEach(btn => {
        btn.onclick = () => {
            if (btn.classList.contains('zoom-disable')) return;
            const val = parseFloat(btn.dataset.zoom);
            setZoom(val);
            document.querySelectorAll('.zoom-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
    });
    
    // Init
    initCamera('environment');
    openDB().catch(console.warn);
    generateUniqueCode();
</script>
</body>
</html>
